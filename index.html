<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Heart Love</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-stars" id="bgStars"></div>
  <div class="rising-hearts" id="risingHearts"></div>
  <div class="effects-layer" id="effectsLayer"></div>

  <main class="container">
    <h1 class="title">Gửi em món quà của anh 💖</h1>

    <div class="controls" id="controls">
      <button id="giftBtn" class="btn">Open Gift</button>
    </div>

    <section id="heartSection" class="heart-section hidden" aria-live="polite">
      <div class="heart-wrap" id="heartWrap">
        <svg class="heart-svg" viewBox="0 0 200 180" aria-hidden="true" role="img">
          <defs>
            <linearGradient id="heartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ffd2ef" />
              <stop offset="45%" stop-color="#ff6ec7" />
              <stop offset="100%" stop-color="#ff2fa6" />
            </linearGradient>
            <radialGradient id="heartInnerLight" cx="30%" cy="25%" r="75%">
              <stop offset="0%" stop-color="rgba(255,255,255,0.78)" />
              <stop offset="65%" stop-color="rgba(255,255,255,0)" />
            </radialGradient>
            <filter id="heartGlow" x="-60%" y="-60%" width="220%" height="220%">
              <feGaussianBlur stdDeviation="4" result="blur1" />
              <feGaussianBlur stdDeviation="9" result="blur2" />
              <feMerge>
                <feMergeNode in="blur2" />
                <feMergeNode in="blur1" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>
          <path class="heart-path" d="M100 166C95 162 89 156 82 151C63 137 43 121 28 104C13 87 7 67 13 49C18 33 33 21 50 19C67 17 82 26 91 41L100 56L109 41C118 26 133 17 150 19C167 21 182 33 187 49C193 67 187 87 172 104C157 121 137 137 118 151C111 156 105 162 100 166Z" />
          <path class="heart-highlight" d="M64 58C71 46 84 40 97 41" />
          <path class="heart-inner-shine" d="M100 166C95 162 89 156 82 151C63 137 43 121 28 104C13 87 7 67 13 49C18 33 33 21 50 19C67 17 82 26 91 41L100 56L109 41C118 26 133 17 150 19C167 21 182 33 187 49C193 67 187 87 172 104C157 121 137 137 118 151C111 156 105 162 100 166Z" />
        </svg>
      </div>

      <article class="question-card" id="questionWrap">
        <p class="question-text">Em có yêu anh không?</p>
        <div class="answer-buttons" id="answerButtons">
          <button id="yesBtn" class="btn btn-yes">Có</button>
          <button id="noBtn" class="btn btn-no">Không</button>
        </div>
        <p id="successMessage" class="success-message" role="status" aria-live="polite"></p>
      </article>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
