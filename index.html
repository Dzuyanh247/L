<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Love</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="fx-layers" aria-hidden="true">
      <div class="stars-layer" id="starsLayer"></div>
      <div class="hearts-layer" id="heartsLayer"></div>
    </div>

    <main class="main-container">
      <h1 class="title">Gửi em Mơ của anh 💖</h1>

      <div class="divider" aria-hidden="true">
        <span></span>
        <i>❤</i>
        <span></span>
      </div>

      <button id="openGiftBtn" class="btn btn-open" type="button">Open Gift 🎁</button>

      <section class="gift-content" id="giftContent" aria-hidden="true">
        <div class="heart-wrapper" id="heartWrapper">
          <div class="orbit-ring" aria-hidden="true"></div>
          <svg class="main-heart" viewBox="0 0 512 512" role="img" aria-label="Neon heart">
            <defs>
              <linearGradient id="heartFill" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ffd2f2" />
                <stop offset="50%" stop-color="#ff5ec4" />
                <stop offset="100%" stop-color="#ff198f" />
              </linearGradient>
              <filter id="heartGlow" x="-30%" y="-30%" width="160%" height="160%">
                <feGaussianBlur stdDeviation="5" result="blur" />
                <feMerge>
                  <feMergeNode in="blur" />
                  <feMergeNode in="SourceGraphic" />
                </feMerge>
              </filter>
            </defs>
            <path
              filter="url(#heartGlow)"
              d="M256 459c-9 0-17.5-3.5-23.9-9.9l-134.8-135C59.2 276 39 244.8 39 210.4 39 146.5 90.8 95 154.5 95c39.6 0 77.1 20.1 101.5 53.4C280.4 115.1 317.9 95 357.5 95 421.2 95 473 146.5 473 210.4c0 34.4-20.2 65.6-58.3 103.7l-134.8 135A33.8 33.8 0 0 1 256 459Z"
              fill="url(#heartFill)"
              stroke="#ffdff8"
              stroke-width="13"
              stroke-linejoin="round"
            />
            <path
              d="M176 170c-20 9-33 27-37 48-2 12 13 16 18 7 7-13 17-22 31-27 16-5 7-35-12-28Z"
              fill="#fff8ff"
              opacity="0.74"
            />
          </svg>
        </div>

        <section class="question-card" id="questionCard">
          <p class="question-text">Em có yêu anh không?</p>
          <div class="buttons-row" id="buttonsRow">
            <button id="yesBtn" class="btn btn-yes" type="button">Có</button>
            <button id="noBtn" class="btn btn-no" type="button">Không</button>
          </div>
          <svg class="dotted-path" viewBox="0 0 440 120" preserveAspectRatio="none" aria-hidden="true">
            <path d="M16 84 C 84 20, 164 112, 238 66 S 354 40, 424 86" />
          </svg>
          <p class="result" id="resultText" aria-live="polite"></p>
        </section>

        <p class="footer-text">Anh thương em nhiều lắm 💕</p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
