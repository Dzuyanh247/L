<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Heart Love</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="particles" id="particles"></div>
  <div class="sparkles" id="sparkles"></div>

  <main class="container">
    <h1 class="title">Gui em Mo cua anh 💖</h1>

    <div class="controls">
      <button id="giftBtn" class="btn">Open Gift</button>
    </div>

    <section id="heartSection" class="heart-section hidden" aria-live="polite">
      <div class="heart-glow"></div>
      <div class="heart" aria-hidden="true"></div>

      <div class="question-wrap" id="questionWrap">
        <p class="question-text">Em có yêu anh không?</p>
        <div class="answer-buttons" id="answerButtons">
          <button id="yesBtn" class="btn btn-yes">Có</button>
          <button id="noBtn" class="btn btn-no">Không</button>
        </div>
        <p id="successMessage" class="success-message" role="status" aria-live="polite"></p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
